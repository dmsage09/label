<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Label Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
}

input{
    margin:5px;
    padding:5px;
}

/* LABEL */
.label{
    width:100mm;
    height:50mm;
    border:2px solid #000;
    border-radius:10px;
    margin:auto;
    padding:6px;
    box-sizing:border-box;
    position:relative;
    overflow:hidden;
}

/* WATERMARK */
.watermark{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:38px;
    color:#000;
    opacity:0.06;
    white-space:nowrap;
    pointer-events:none;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.company-block{
    display:flex;
    align-items:center;
    gap:6px;
}

/* LOGO */
.logo{
    height:30px;
    object-fit:contain;
}

/* COMPANY NAME */
.company-name{
    font-size:13px;
    font-weight:bold;
}

.divider{
    border:none;
    border-top:1px solid black;
    margin:2px 0;
}

.awb{
    font-size:15px;
    font-weight:bold;
}

.row{
    display:flex;
    justify-content:space-between;
    font-size:11px;
}

.left, .right{
    width:48%;
    text-align:left;
}

/* ARROW */
.arrow-box{
    position:absolute;
    top:5px;
    right:8px;
    text-align:center;
    font-size:9px;
}

.arrow{
    font-size:16px;
    display:block;
    margin-bottom:2px;
}

/* CHECKBOX */
.checkbox{
    margin-top:3px;
}

/* PRINT */
@page{
    size:100mm 50mm;
    margin:0;
}

@media print{
body{ margin:0; }
button,input,h2{ display:none; }
.label{ page-break-after:avoid; }
}
</style>

<script>
function updateLabel(){
    let company = document.getElementById("company").value;

    document.getElementById("companyText").innerText = company;
    document.getElementById("watermark").innerText = company;

    // FIX: ensure AWB updates properly
    document.getElementById("awbText").innerText = document.getElementById("awb").value;
}

const fields = ["awb","party","po","inv","from","to","pkg"];

window.onload = function(){
    fields.forEach(id=>{
        document.getElementById(id).addEventListener("input",()=>{
            document.getElementById(id+"Text").innerText = document.getElementById(id).value;
        });
    });
}
</script>

</head>

<body>

<h2>Logistics Label Generator</h2>

<input id="company" placeholder="Company Name" oninput="updateLabel()">
<input id="awb" placeholder="AWB">
<input id="party" placeholder="Party">
<input id="po" placeholder="PO">
<input id="inv" placeholder="INV">
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="pkg" placeholder="PKG">

<br><br>
<button onclick="window.print()">Print Label</button>

<br><br>

    <div class="watermark" id="watermark">COMPANY</div>
